version: '3.8'

services:
  db:
    image: ankane/pgvector:latest
    container_name: aegis_db
    environment:
      POSTGRES_USER: aegis_user
      POSTGRES_PASSWORD: aegis_password
      POSTGRES_DB: aegis_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: aegis_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  gateway:
    build: 
      context: ./gateway
    container_name: aegis_gateway
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql+asyncpg://aegis_user:aegis_password@db:5432/aegis_db
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: ./frontend
    container_name: aegis_frontend
    ports:
      - "3000:3000"
    depends_on:
      - gateway

volumes:
  pgdata:
  redisdata:
